<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <link
      href="https://fonts.googleapis.com/css?family=Lato:300,400,700"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="header">
      <img
        class="header__image"
        src="./eisenhower-matrix.jpg"
        alt="Eisenhower Matrix"
      />
      <a
        class="header__more-info"
        href="https://goal-life.com/page/method/matrix-eisenhower"
        >Want more details?</a
      >
    </div>
    <div class="main-container">
      <section class="task-section">
        <label class="task-section__label" for="new-task">Add Item</label>
        <div class="task-section__input">
          <input
            id="new-task"
            class="task-section__input-field"
            type="text"
            placeholder="Enter new task"
          />
          <button class="task-section__add-btn" id="add-task">Add</button>
        </div>
      </section>
      <section class="task-list">
        <h3 class="task-list__title">Todo</h3>
        <ul class="task-list__items" id="incompleteTasks"></ul>
      </section>
      <section class="task-list task-list--completed">
        <h3 class="task-list__title">Completed</h3>
        <ul class="task-list__items" id="completed-tasks"></ul>
      </section>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
